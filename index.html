<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Natasha - Hike AI</title>
    <style>
        /* Modern, immersive dark gradient background */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1c24 0%, #0d0e12 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Minimalist Corner Headers (Low-opacity) */
        .corner-text {
            position: absolute;
            top: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3); /* 30% Opacity */
            letter-spacing: 1px;
            text-transform: uppercase;
            user-select: none;
            z-index: 5;
        }

        .top-left { left: 24px; }
        .top-right { right: 24px; }

        /* Left Side Character View */
        .character-view {
            position: absolute;
            left: 5%;
            bottom: 0;
            height: 90vh; /* Scaled full-body view */
            width: 40vw;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1;
        }

        .character-view img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            opacity: 0.95;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* Right Side Content Area */
        .content-area {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 40vw;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 2;
        }

        /* Main Info Card */
        .info-card {
            background: rgba(22, 25, 32, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #ffffff 0%, #a0a5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-header {
            color: #ff3366;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        p {
            color: #a0a5b5;
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
        }

        /* Stats Card */
        .stats-area {
            background: rgba(22, 25, 32, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease-out;
        }

        .stats-area h2 {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #a0a5b5;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .stat-item .label {
            color: #ff3366;
            font-weight: 500;
        }

        /* Guidance arrow pointing down - Fixed position & moved up */
        .guide-arrow {
            position: fixed;
            bottom: 220px; /* Moved up safely above the widget */
            right: 40px;
            background: rgba(22, 25, 32, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
            z-index: 10;
        }

        .guide-arrow svg {
            width: 24px;
            height: 24px;
            fill: #ff3366;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(10px); }
            60% { transform: translateY(5px); }
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 800px) {
            body {
                display: block; /* Changes from center flex to block for scrolling */
                overflow-y: auto; /* Allows vertical scrolling */
                padding-bottom: 150px; /* Leaves room at the bottom for the widget */
            }

            .character-view {
                position: relative;
                width: 100%;
                height: 50vh; /* Takes up top half of screen */
                left: 0;
                margin-top: 60px; /* Clears corner text */
            }

            .content-area {
                position: relative;
                width: 90%;
                right: auto;
                top: auto;
                transform: none;
                margin: 20px auto 0 auto; /* Centers the content */
                align-items: center;
            }

            .corner-text {
                font-size: 0.8rem;
            }

            .guide-arrow {
                bottom: 180px; /* Slightly lower on mobile but still clears widget */
                right: 20px; /* Closer to edge on small screens */
            }
        }
    </style>
</head>
<body>

    <div class="corner-text top-left">Hike</div>
    <div class="corner-text top-right">Powered by Visceral</div>

    <div class="character-view">
        <img src="avatar.png" alt="Natasha AI">
    </div>

    <div class="content-area">
        <div class="info-card">
            <div class="status-header">Incoming Video Call</div>
            <h1>Meet Natasha</h1>
            <p>Your Gen-Z, South Bombay companion. Ask her about the best local spots.</p>
        </div>

        <div class="stats-area">
            <h2>Profile</h2>
            <div class="stat-item"><span class="label">NAME:</span> Natasha</div>
            <div class="stat-item"><span class="label">AGE:</span> 23</div>
            <div class="stat-item"><span class="label">PLACE:</span> Colaba, Mumbai</div>
            <div class="stat-item"><span class="label">PERSONALITY:</span> Gen-Z, SoBo companion</div>
        </div>
    </div>

    <div class="guide-arrow">
        <svg viewBox="0 0 24 24"><path d="M12 24l-8-8h6v-16h4v16h6z"/></svg>
    </div>

    <script src="https://cdn.dev.runwayml.com/prod/widget.js"
            data-pub-key="pub_c59ace8060638b569d9cf1100ff73cb148966bbe58b045df6e06d2cca979593c"></script>
</body>
</html>
