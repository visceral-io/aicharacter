<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to Natasha</title>
    <style>
        /* Immersive dark gradient background */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1c24 0%, #0d0e12 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Minimalist Corner Headers */
        .corner-text {
            position: absolute;
            top: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3); /* 30% Opacity */
            letter-spacing: 1px;
            text-transform: uppercase;
            user-select: none;
        }

        .top-left {
            left: 24px;
        }

        .top-right {
            right: 24px;
        }

        /* Focused layout pushed towards the bottom right near the embed */
        .content-wrapper {
            position: absolute;
            bottom: 140px;
            right: 40px;
            max-width: 360px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            animation: fadeIn 0.8s ease-out;
        }

        /* Clean Profile presentation */
        .profile-info {
            background: rgba(22, 25, 32, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #ffffff 0%, #a0a5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a0a5b5;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustment for mobile screens */
        @media (max-width: 600px) {
            .content-wrapper {
                position: relative;
                bottom: auto;
                right: auto;
                align-items: center;
                text-align: center;
                margin-bottom: 160px;
            }
        }
    </style>
</head>
<body>

    <div class="corner-text top-left">Hike</div>
    <div class="corner-text top-right">Powered by Visceral</div>

    <div class="content-wrapper">
        <div class="profile-info">
            <h1>Talk to Natasha</h1>
            <p>Turn on your microphone and accept the incoming video call to chat.</p>
        </div>
    </div>

    <script src="https://cdn.dev.runwayml.com/prod/widget.js"
            data-pub-key="pub_c59ace8060638b569d9cf1100ff73cb148966bbe58b045df6e06d2cca979593c"></script>
</body>
</html>
